name: 智能Worker更新系统

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 1 * * *"  # 每天北京时间早上9点自动运行
  workflow_dispatch:
    inputs:
      操作模式:
        description: '请选择操作模式'
        required: true
        default: '自动'
        type: choice
        options:
        - '自动'
        - '手动'
      版本类型:
        description: '选择版本类型（手动模式有效）'
        required: false
        default: '正式版'
        type: choice
        options:
        - '正式版'
        - '测试版'
      强制更新:
        description: '是否强制更新（手动模式有效）'
        required: false
        default: '否'
        type: choice
        options:
        - '是'
        - '否'
      版本选择:
        description: '输入版本号/编号（强制更新时有效）'
        required: false
        type: string

permissions:
  contents: write

jobs:
  版本管理:
    runs-on: ubuntu-latest
    outputs:
      版本信息: ${{ steps.获取版本.outputs.版本信息 }}
    steps:
      - name: 获取版本数据
        id: 获取版本
        run: |
          API_URL="https://api.github.com/repos/bia-pain-bache/BPB-Worker-Panel/releases"
          响应数据=$(curl -s "$API_URL")
          版本列表=$(echo "$响应数据" | jq -c '[.[] | {
            编号: (input_line_number + 1),
            版本号: .tag_name,
            类型: if .prerelease then "测试版" else "正式版" end,
            发布日期: .published_at,
            资源文件: [.assets[] | select(.name == "worker.zip") | .browser_download_url]
          }] | sort_by(.发布日期) | reverse')
          echo "版本信息=$版本列表" >> $GITHUB_OUTPUT

  执行更新:
    needs: 版本管理
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检查或创建README.md
        run: |
          if [ ! -f "README.md" ]; then
            echo -e '# Worker自动更新系统\n\n## 操作模式\n- **自动模式**：定时检查更新\n- **手动模式**：交互式版本选择\n\n## 使用指南\n1. 手动模式可指定具体版本\n2. 强制更新会跳过版本检查' > README.md
          fi

      - name: 显示版本菜单
        if: ${{ github.event.inputs.操作模式 == '手动' && github.event.inputs.强制更新 == '是' }}
        run: |
          echo "┌──────────────────────────────────────┐"
          echo "│      🛠️ 可用Worker版本列表       │"
          echo "├──────┬───────────┬──────────────────┤"
          echo "│ 编号 │   类型    │     版本号      │"
          echo "├──────┼───────────┼──────────────────┤"
          
          所有版本='${{ needs.版本管理.outputs.版本信息 }}'
          echo "$所有版本" | jq -r '.[] | "│ \(.编号)  │ \(.类型) │ \(.版本号) │"'
          
          echo "└──────┴───────────┴──────────────────┘"
          echo "💡 输入编号或完整版本号进行选择"

      - name: 处理版本选择
        id: 版本选择器
        run: |
          版本数据='${{ needs.版本管理.outputs.版本信息 }}'
          操作模式="${{ github.event.inputs.操作模式 }}"
          版本类型="${{ github.event.inputs.版本类型 }}"
          强制更新="${{ github.event.inputs.强制更新 }}"
          用户输入="${{ github.event.inputs.版本选择 }}"

          if [ "$操作模式" == "自动" ]; then
            # 自动模式使用原有逻辑
            if [ -f "自动更新类型.txt" ]; then
              配置类型=$(cat 自动更新类型.txt)
            else
              配置类型="正式版"
              echo "$配置类型" > 自动更新类型.txt
            fi
            
            if [ "$配置类型" == "测试版" ]; then
              # 测试版模式下检查正式版是否更高
              最新正式版=$(echo "$版本数据" | jq -r '.[] | select(.类型 == "正式版") | .版本号' | head -1)
              最新测试版=$(echo "$版本数据" | jq -r '.[] | select(.类型 == "测试版") | .版本号' | head -1)
              
              if [ -n "$最新正式版" ] && [ -n "$最新测试版" ]; then
                if [ "$(printf '%s\n' "$最新测试版" "$最新正式版" | sort -V | head -n1)" = "$最新测试版" ] && \
                   [ "$最新测试版" != "$最新正式版" ]; then
                  echo "ℹ️ 正式版($最新正式版)高于测试版($最新测试版)，优先更新到正式版"
                  目标版本=$最新正式版
                else
                  目标版本=$最新测试版
                fi
              else
                目标版本=$最新测试版
              fi
            else
              目标版本=$(echo "$版本数据" | jq -r '.[] | select(.类型 == "正式版") | .版本号' | head -1)
            fi
          else
            # 手动模式处理
            if [ "$强制更新" == "是" ]; then
              if [ -n "$用户输入" ]; then
                if [[ "$用户输入" =~ ^[0-9]+$ ]]; then
                  # 按编号选择
                  目标版本=$(echo "$版本数据" | jq -r --argjson 序号 "$用户输入" '.[] | select(.编号 == $序号) | .版本号')
                else
                  # 按版本号选择
                  标准化版本=$(echo "$用户输入" | sed 's/^v//')
                  目标版本=$(echo "$版本数据" | jq -r --arg 版本 "$标准化版本" '.[] | select(.版本号 | contains($版本)) | .版本号' | head -1)
                fi
              else
                # 未指定版本时选择最新
                目标版本=$(echo "$版本数据" | jq -r --arg 类型 "$版本类型" '.[] | select(.类型 == $类型) | .版本号' | head -1)
              fi
            else
              # 非强制更新使用原有比较逻辑
              当前版本=$(cat version.txt 2>/dev/null | grep '当前版本' | awk '{print $2}' || echo "")
              目标版本=$(echo "$版本数据" | jq -r --arg 类型 "$版本类型" '.[] | select(.类型 == $类型) | .版本号' | head -1)
              
              if [ -n "$当前版本" ]; then
                if [ "$(printf '%s\n' "$当前版本" "$目标版本" | sort -V | head -n1)" = "$当前版本" ] && \
                   [ "$当前版本" != "$目标版本" ]; then
                  echo "ℹ️ 需要更新：$当前版本 → $目标版本"
                else
                  echo "⚠️ 当前已是最新版本，无需更新"
                  echo "无需更新=true" >> $GITHUB_ENV
                  exit 0
                fi
              fi
            fi
          fi

          # 验证目标版本
          [ -z "$目标版本" ] && { echo "::error::找不到符合条件的版本"; exit 1; }
          
          下载地址=$(echo "$版本数据" | jq -r --arg 版本号 "$目标版本" '.[] | select(.版本号 == $版本号) | .资源文件[0]')
          [ -z "$下载地址" ] && { echo "::error::该版本缺少worker.zip文件"; exit 1; }

          echo "目标版本=$目标版本" >> $GITHUB_ENV
          echo "下载地址=$下载地址" >> $GITHUB_ENV
          echo "版本类型=$版本类型" >> $GITHUB_ENV

      - name: 执行更新
        if: env.无需更新 != 'true'
        env:
          目标版本号: ${{ env.目标版本 }}
          资源地址: ${{ env.下载地址 }}
        run: |
          # 保护性清理
          保护文件=("README.md" "自动更新类型.txt" "version.txt")
          find . -mindepth 1 -maxdepth 1 ! -name "${保护文件[0]}" \
            ! -name "${保护文件[1]}" ! -name "${保护文件[2]}" -exec rm -rf {} +
          
          echo "⬇️ 正在下载 $目标版本号 ..."
          wget -q --show-progress -O worker.zip "$资源地址"
          
          echo "📦 正在解压文件..."
          unzip -q worker.zip
          rm worker.zip

          # 记录版本信息
          cat <<EOF > version.txt
          当前版本: $目标版本号
          版本类型: ${{ env.版本类型 }}
          更新时间: $(date "+%Y-%m-%d %H:%M:%S")
          更新方式: ${{ github.event.inputs.操作模式 == '自动' && '自动' || '手动' }}更新
          EOF

          echo "✅ 更新完成！"

      - name: 提交变更
        if: env.无需更新 != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 [${{ github.event.inputs.操作模式 == '自动' && '自动' || '手动' }}更新] Worker到${{ env.目标版本 }}"
          commit_author: "自动更新系统 <auto-updater@example.com>"